# ... keep everything else the same ...

  static-analysis:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: sudo apt update && sudo apt install -y libgdal-dev libomp-dev clang-tidy

    # (keep xtl/xtensor install steps)

    - name: Configure with compile commands
      run: |
        cmake -S . -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
          -DXBIOCLIM_BUILD_TESTS=OFF

    - name: Run clang-tidy (enforced)
      run: |
        clang-tidy src/*.cpp -p build --warnings-as-errors='*'
